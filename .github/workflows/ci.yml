name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout code ───────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Set up Python ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Cache pip dependencies ───────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Run migrations ───────────────────────────────────────────────────
      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: salary_management.settings
        run: |
          python manage.py migrate

      # ── Run tests ────────────────────────────────────────────────────────
      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: salary_management.settings
        run: |
          pytest tests/ -v --tb=short

      # ── Coverage report ──────────────────────────────────────────────────
      - name: Coverage report
        env:
          DJANGO_SETTINGS_MODULE: salary_management.settings
        run: |
          pip install pytest-cov
          pytest tests/ --cov=employees --cov-report=term-missing